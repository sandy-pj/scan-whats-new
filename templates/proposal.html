<!DOCTYPE html>
<!--
  ───────────────────────────────────────────────────────────
  FINAL-OUTPUT TEMPLATE  (paceparkgroup.com blog style)
  Used by loop skills to render final documents as self-contained HTML.
  To produce a document: copy this file, then replace the three tokens:
        {{TITLE}}  — document/proposal title (also goes in <title>)
        {{DATE}}   — e.g. June 22, 2026
        {{BODY}}   — the content, as simple HTML (see tags below)
  Body tags:  <p>…</p>  <h2>…</h2>  <h3>…</h3>  <ul><li>…</li></ul>
              <blockquote>…</blockquote>  <a href>  <code>  <hr>
  Keep it SELF-CONTAINED (all CSS inline, no external files) so it opens anywhere.
  ───────────────────────────────────────────────────────────
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — PacePark</title>
<style>
  :root{
    --bg:#ffffff;--txt:#1a1a1a;--muted:#6b6b6b;--line:#e7e5e0;--accent:#ff6719;
    --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.7;}
  .topbar{border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;}
  .topbar .inner{max-width:680px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;}
  .topbar .brand{font-family:var(--serif);font-weight:700;font-size:17px;color:var(--txt);text-decoration:none;}
  .topbar .brand span{color:var(--accent);}
  .topbar .kicker{color:var(--muted);font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
  article{max-width:680px;margin:0 auto;padding:56px 22px 100px;}
  .post-title{font-family:var(--serif);font-size:42px;font-weight:800;letter-spacing:-.6px;line-height:1.2;margin:0 0 14px;}
  .post-meta{color:var(--muted);font-size:14px;font-weight:600;letter-spacing:.2px;margin:0 0 36px;padding-bottom:24px;border-bottom:1px solid var(--line);}
  .body{font-family:var(--serif);font-size:20px;line-height:1.75;color:#242424;}
  .body p{margin:0 0 26px;}
  .body h2{font-family:var(--serif);font-size:28px;font-weight:800;letter-spacing:-.3px;margin:44px 0 14px;}
  .body h3{font-family:var(--serif);font-size:22px;font-weight:700;margin:36px 0 12px;}
  .body a{color:var(--accent);text-decoration:underline;}
  .body strong{font-weight:700;}
  .body blockquote{margin:30px 0;padding:4px 0 4px 22px;border-left:3px solid var(--accent);color:#444;font-style:italic;}
  .body ul,.body ol{margin:0 0 26px;padding-left:26px;}
  .body li{margin:0 0 10px;}
  .body hr{border:none;border-top:1px solid var(--line);margin:44px 0;}
  .body code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.88em;background:#f4f2ee;padding:2px 6px;border-radius:5px;}
  .body .sources{font-family:var(--sans);font-size:14px;color:var(--muted);}
  @media(max-width:600px){.post-title{font-size:32px}.body{font-size:18px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="inner">
    <a class="brand" href="#">PacePark <span>AI New Business</span></a>
    <span class="kicker">Proposal</span>
  </div>
</div>
<article>
  <h1 class="post-title">{{TITLE}}</h1>
  <div class="post-meta">PacePark · AI New Business · {{DATE}}</div>
  <div class="body">
{{BODY}}
  </div>
</article>
</body>
</html>
